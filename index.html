<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Prior Day Performance Summary — Travellers Group</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{--bg:#0F1117;--surface:#181B24;--surface-2:#1F2330;--border:#2A2E3B;
    --text:#E8E9ED;--text-muted:#8B8FA3;--accent:#4ADE80;--red:#F87171;
    --amber:#FBBF24;--blue:#60A5FA;--radius:12px;--radius-sm:8px}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;line-height:1.5}
  .header{padding:32px 40px 0;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px}
  .subtitle{color:var(--text-muted);font-size:14px;margin-top:4px}
  .report-pill{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 16px;font-size:13px;color:var(--text-muted);display:flex;align-items:center;gap:8px}
  .report-pill .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .tabs-bar{padding:24px 40px 0;border-bottom:1px solid var(--border)}
  .tabs{display:flex;gap:4px;overflow-x:auto}
  .tab{padding:10px 20px;font-size:13px;font-weight:500;color:var(--text-muted);background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:all .2s;border-radius:var(--radius-sm) var(--radius-sm) 0 0}
  .tab:hover{color:var(--text);background:var(--surface)}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);background:var(--surface)}
  .main{padding:28px 40px 40px}
  .panel{display:none}.panel.active{display:block}
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin-bottom:28px}
  .kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;animation:fadeUp .5s cubic-bezier(.22,1,.36,1) both}
  .kpi-card:nth-child(1){animation-delay:.05s}.kpi-card:nth-child(2){animation-delay:.1s}
  .kpi-card:nth-child(3){animation-delay:.15s}.kpi-card:nth-child(4){animation-delay:.2s}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .kpi-card .label{font-size:12px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
  .kpi-card .value{font-family:'Fraunces',serif;font-size:28px;font-weight:700;line-height:1.1}
  .section-title{font-family:'Fraunces',serif;font-size:18px;font-weight:700;margin-bottom:16px;margin-top:8px}
  .table-container{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:28px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{background:var(--surface-2);padding:12px 16px;text-align:left;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);border-bottom:1px solid var(--border)}
  thead th:not(:first-child){text-align:right}
  tbody td{padding:12px 16px;border-bottom:1px solid var(--border)}
  tbody td:not(:first-child){text-align:right;font-variant-numeric:tabular-nums}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:rgba(255,255,255,.02)}
  tbody tr.total-row td{font-weight:700;background:var(--surface-2);border-top:2px solid var(--border)}
  .note-bar{font-size:11px;color:var(--text-muted);margin-bottom:20px;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm)}
  .findings-label{font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
  .finding-item{display:flex;gap:10px;align-items:flex-start;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;line-height:1.5}
  .finding-item::before{content:'\2192';color:var(--accent);font-weight:700;flex-shrink:0;margin-top:1px}
  .footer{padding:16px 40px;font-size:11px;color:var(--text-muted);border-top:1px solid var(--border);margin-top:20px}
  @media(max-width:768px){.header,.tabs-bar,.main{padding-left:20px;padding-right:20px}}

  /* MTD Overview styles */
  .mtd-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px;flex-wrap:wrap;gap:12px}
  .mtd-kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:28px}
  .mtd-kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px}
  .mtd-kpi-label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
  .mtd-kpi-val{font-family:'Fraunces',serif;font-size:24px;font-weight:700;line-height:1.1;margin-bottom:4px}
  .mtd-kpi-sub{font-size:11px;color:var(--text-muted)}
  .chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:28px}
  .chart-card-wide{grid-column:span 2}
  .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
  .chart-title{font-size:13px;font-weight:600;margin-bottom:2px}
  .chart-sub{font-size:11px;color:var(--text-muted);margin-bottom:16px}
  .prop-cards-list{display:flex;flex-direction:column;gap:8px;margin-bottom:28px}
  .prop-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .2s}
  .prop-card:hover{border-color:rgba(255,255,255,.15)}
  .prop-card-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;cursor:pointer;gap:16px}
  .prop-card-left{display:flex;align-items:center;gap:12px}
  .prop-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .prop-name{font-weight:600;font-size:14px}
  .prop-meta{font-size:12px;color:var(--text-muted);margin-top:2px}
  .prop-card-right{display:flex;align-items:center;gap:16px;flex-shrink:0}
  .prop-mtd{font-family:'Fraunces',serif;font-size:20px;font-weight:700}
  .prop-pct{font-size:12px;white-space:nowrap}
  .prop-progress-bar{width:80px;height:5px;background:var(--border);border-radius:3px;overflow:hidden;flex-shrink:0}
  .prop-progress-bar div{height:100%;border-radius:3px;transition:width .5s ease}
  .prop-chevron{font-size:16px;color:var(--text-muted);transition:transform .2s;width:16px;text-align:center}
  .sparkline{display:block}
  .prop-detail{padding:0 20px 20px;border-top:1px solid var(--border);background:var(--surface-2)}
  .prop-detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;padding-top:16px}
  .prop-stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px}
  .prop-stat-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;font-weight:500}
  .prop-stat-val{font-size:15px;font-weight:600}
  .chart-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2px;gap:12px}
  .toggle-btn{flex-shrink:0;padding:4px 12px;font-size:11px;font-weight:600;color:var(--text-muted);background:var(--surface-2);border:1px solid var(--border);border-radius:20px;cursor:pointer;transition:all .2s;white-space:nowrap}
  .toggle-btn:hover{color:var(--blue);border-color:var(--blue)}
  .toggle-btn.active{color:var(--blue);border-color:var(--blue);background:rgba(96,165,250,0.1)}
  @media(max-width:900px){.chart-grid{grid-template-columns:1fr}.chart-card-wide{grid-column:span 1}.sparkline{display:none}.prop-card-right{gap:8px}}
</style>
</head>

let mtdChartsBuilt=false, occChart, adrChart, occShowingFull=false, adrShowingFull=false;
const hideOTB = item=>!item.text.includes('(OTB)');
function buildMTDCharts() {
  if (mtdChartsBuilt || typeof Chart === 'undefined') return;
  mtdChartsBuilt = true;
  const labels = MTD_LABELS;
  const combinedLabels = MTD_LABELS.concat(MTD_OTB_LABELS);
  const chartOpts = {
    responsive:true,
    plugins:{legend:{labels:{color:'#8B8FA3',font:{size:11}}}},
    scales:{
      x:{ticks:{color:'#8B8FA3',font:{size:10}},grid:{color:'rgba(42,46,59,0.8)'}},
      y:{ticks:{color:'#8B8FA3',font:{size:10},callback:v=>'$'+v.toLocaleString()},grid:{color:'rgba(42,46,59,0.8)'}}
    }
  };
  const pctOpts = {
    responsive:true,
    plugins:{legend:{labels:{color:'#8B8FA3',font:{size:11}}}},
    scales:{
      x:{ticks:{color:'#8B8FA3',font:{size:10}},grid:{color:'rgba(42,46,59,0.8)'}},
      y:{min:0,max:100,ticks:{color:'#8B8FA3',font:{size:10},callback:v=>v+'%'},grid:{color:'rgba(42,46,59,0.8)'}}
    }
  };
  const occOpts = {
    responsive:true,
    plugins:{legend:{labels:{color:'#8B8FA3',font:{size:11},filter:hideOTB}}},

    }

    plugins:{legend:{labels:{color:'#8B8FA3',font:{size:11},filter:hideOTB}}},
    scales:{

      y:{ticks:{color:'#8B8FA3',font:{size:10},callback:v=>'$'+v.toLocaleString()},grid:{color:'rgba(42,46,59,0.8)'}}
    }
  };

function toggleOccChart() {
  if (!occChart) return;
  occShowingFull = !occShowingFull;
  const btn = document.getElementById('occToggle');
  const sub = document.getElementById('occSub');
  if (occShowingFull) {
    occChart.data.labels = MTD_LABELS.concat(MTD_OTB_LABELS);
    occChart.data.datasets = MTD_OCC_FULL_DS;
    occChart.options.plugins.legend.labels.filter = null;
    sub.textContent = 'Solid = actual (1–11 Mar) · Dashed = OTB forward (12–31 Mar)';
    btn.textContent = '← Actual only';
    btn.classList.add('active');
  } else {
    occChart.data.labels = MTD_LABELS;
    occChart.data.datasets = MTD_OCC_DS;
    occChart.options.plugins.legend.labels.filter = hideOTB;
    sub.textContent = 'Actual — 1 to 11 March';
    btn.textContent = 'Show full month →';
    btn.classList.remove('active');
  }
  occChart.update();
}

function toggleProp(i) {
  const d=document.getElementById('detail-'+i);
  const c=document.getElementById('chevron-'+i);
  if(d.style.display==='none'){d.style.display='block';c.textContent='▴';d.style.animation='fadeUp .3s ease both';}
  else{d.style.display='none';c.textContent='▾';}
}
function init(){
  const tabsEl=document.getElementById('tabs'),mainEl=document.getElementById('main');
  tabsEl.innerHTML=TABS.map((t,i)=>`<button class="tab ${i===0?'active':''}" data-tab="${t.id}">${t.name}</button>`).join('');
  mainEl.innerHTML=TABS.map((t,i)=>`<div class="panel ${i===0?'active':''}" data-panel="${t.id}">${PANELS[t.id]}</div>`).join('');
  if(document.querySelector('.panel.active[data-panel="overview"]'))buildMTDCharts();
  tabsEl.addEventListener('click',e=>{
    const t=e.target.closest('.tab');if(!t)return;
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    document.querySelector('[data-panel="'+t.dataset.tab+'"]').classList.add('active');
    if(t.dataset.tab==='overview')buildMTDCharts();
  });
}
